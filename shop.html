  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Bookstore | Shop</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body { background: #f8f9fa; font-family: Arial, sans-serif; }

    h2 { text-align: center; margin: 20px 0; font-weight: bold; }

    /* Force 3 books per row */
    .book-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
      gap: 20px; 
      padding: 20px; 
    }

    .book { 
      background: white; 
      padding: 15px; 
      border-radius: 10px; 
      box-shadow: 0 2px 6px rgba(0,0,0,0.1); 
      transition: transform 0.2s ease-in-out;
    }
    .book:hover { transform: translateY(-5px); }
    .book img { 
      width: 100%; 
      height: 250px; 
      object-fit: cover; 
      border-radius: 10px; 
    }
    .book h3 { font-size: 1.1rem; margin: 10px 0 5px; }
    .book p { margin: 0; font-size: 0.9rem; }
    .book button { 
      margin-top: 10px; 
      background: #212529; 
      color: white; 
      border: none; 
      padding: 8px 12px; 
      border-radius: 5px; 
      cursor: pointer; 
    }
    .book button:hover { background: #ffc107; color: #000; }
    
    footer { 
      background: #212529; 
      color: #fff; 
      text-align: center; 
      padding: 15px; 
      margin-top: 40px; 
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="assets/logo.png" alt="Logo" height="40" class="me-2">
        Elite Bookstore
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="shop.html">Shop</a></li>
          <li class="nav-item">
            <a class="nav-link" href="cart.html">
              Cart (<span id="cart-count">0</span>)
            </a>
          </li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section>
    <h2>Our Collection</h2>
    <div class="book-grid" id="shop-books"></div>
  </section>

  <footer>
    <p>&copy; 2025 Elite Bookstore | All Rights Reserved</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
  <script>
    const shopContainer = document.getElementById("shop-books");
    
    // Display Books
    if (shopContainer && typeof books !== 'undefined') {
      shopContainer.innerHTML = books.map(book => `
        <div class="book">
          <img src="${book.img}" alt="${book.title}">
          <h3>${book.title}</h3>
          <p>${book.author}</p>
          <p>Ksh ${book.price}</p>
          <button onclick="handleAddToCart(${book.id})">Add to Cart</button>
        </div>
      `).join("");
    }

    // New logic to prevent double entry and prompt for checkout
    function handleAddToCart(bookId) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      
      // Check if book is already in cart
      const exists = cart.find(item => item.id === bookId);

      if (exists) {
        alert("This book is already in your cart.");
      } else {
        // Find the book details from your 'books' array (defined in app.js)
        const bookToAdd = books.find(b => b.id === bookId);
        if (bookToAdd) {
          cart.push(bookToAdd);
          localStorage.setItem("cart", JSON.stringify(cart));
          
          // Update navbar count
          updateCartCount(cart.length);

          // Ask to proceed to checkout
          if (confirm("Book added! Would you like to proceed to checkout?")) {
            window.location.href = "cart.html";
          }
        }
      }
    }

    function updateCartCount(count) {
      localStorage.setItem("cartCount", count);
      document.getElementById("cart-count").innerText = count;
    }

    // Initial count display on page load
    document.getElementById("cart-count").innerText = localStorage.getItem("cartCount") || 0;
  </script>
</body>
</html>
