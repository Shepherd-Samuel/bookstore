<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Bookstore | Shop</title>

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Embedded CSS -->
  <style>
    body { background: #f8f9fa; font-family: Arial, sans-serif; }
    nav { background: #212529; padding: 10px 20px; }
    nav a { color: #fff; margin: 0 10px; text-decoration: none; font-weight: 500; }
    nav a:hover { color: #ffc107; }
    h1 { font-size: 1.5rem; margin: 0; display: flex; align-items: center; gap: 10px; }
    h1 img { height: 40px; }

    h2 { text-align: center; margin: 20px 0; font-weight: bold; }

    /* Force 3 books per row */
    .book-grid { 
      display: grid; 
      grid-template-columns: repeat(3, 1fr); 
      gap: 20px; 
      padding: 20px; 
    }

    .book { 
      background: white; 
      padding: 15px; 
      border-radius: 10px; 
      box-shadow: 0 2px 6px rgba(0,0,0,0.1); 
    }
    .book img { 
      width: 100%; 
      height: 250px; 
      object-fit: cover; 
      border-radius: 10px; 
    }
    .book h3 { font-size: 1.1rem; margin: 10px 0 5px; }
    .book p { margin: 0; font-size: 0.9rem; }
    .book button { 
      margin-top: 10px; 
      background: #212529; 
      color: white; 
      border: none; 
      padding: 8px 12px; 
      border-radius: 5px; 
      cursor: pointer; 
    }
    .book button:hover { background: #ffc107; color: #000; }
    footer { background: #212529; color: #fff; text-align: center; padding: 15px; margin-top: 40px; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <nav class="d-flex justify-content-between align-items-center">
      <h1 class="text-white">
        <img src="assets/logo.png" alt="Elite Bookstore Logo">
        Elite Bookstore
      </h1>
      <div>
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
  </header>

  <!-- Shop Section -->
  <section>
    <h2>Our Collection</h2>
    <div class="book-grid" id="shop-books"></div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Elite Bookstore | All Rights Reserved</p>
  </footer>

  <script src="app.js"></script>
  <script>
    const shopContainer = document.getElementById("shop-books");
    if (shopContainer) {
      shopContainer.innerHTML = books.map(book => `
        <div class="book">
          <img src="${book.img}" alt="${book.title}">
          <h3>${book.title}</h3>
          <p>${book.author}</p>
          <p>Ksh ${book.price}</p>
          <button onclick="addToCart(${book.id})">Add to Cart</button>
        </div>
      `).join("");
    }
  </script>
</body>
</html>
