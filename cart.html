<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Bookstore | Cart</title>

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Embedded CSS -->
  <style>
    body { background: #f8f9fa; font-family: Arial, sans-serif; }
    .navbar-brand img { height: 40px; margin-right: 10px; }
    h2 { text-align: center; margin: 20px 0; font-weight: bold; }
    .cart-container { max-width: 800px; margin: auto; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #ddd; }
    .cart-item img { width: 80px; border-radius: 5px; }
    .cart-summary { margin-top: 20px; text-align: right; }
    button { border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; }
    .btn-danger { background: #dc3545; color: white; }
    .btn-success { background: #28a745; color: white; }
    footer { background: #212529; color: #fff; text-align: center; padding: 15px; margin-top: 40px; }
  </style>
</head>
<body>

  <!-- Bootstrap Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="assets/logo.png" alt="Elite Bookstore Logo">
        Elite Bookstore
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
          <li class="nav-item"><a class="nav-link active" href="cart.html">Cart (<span id="cart-count">0</span>)</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Cart Section -->
  <section>
    <h2>Your Shopping Cart</h2>
    <div class="cart-container" id="cart-container"></div>
    <div class="cart-summary" id="cart-summary"></div>
  </section>

<!-- Email + Phone Modal -->
<div class="modal fade" id="emailModal" tabindex="-1" aria-labelledby="emailModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="emailModalLabel">Enter Your Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <input type="email" id="customerEmail" class="form-control mb-3" placeholder="Email (example@email.com)" required>
        <input type="tel" id="customerPhone" class="form-control" placeholder="Phone Number (07XXXXXXXX)" required>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" id="confirmPay" class="btn btn-success">Proceed to Pay</button>
      </div>
    </div>
  </div>
</div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Elite Bookstore | All Rights Reserved</p>
  </footer>

  <!-- Scripts -->
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
  <script src="daraja.js"></script>
  <script>
    function renderCart() {
      const container = document.getElementById("cart-container");
      const summary = document.getElementById("cart-summary");
      if (cart.length === 0) {
        container.innerHTML = "<p>Your cart is empty.</p>";
        summary.innerHTML = "";
        return;
      }
      container.innerHTML = cart.map(item => `
        <div class="cart-item">
          <img src="${item.img}" alt="${item.title}">
          <div>
            <h5>${item.title}</h5>
            <p>Ksh ${item.price} x ${item.qty}</p>
          </div>
          <div>
            <button class="btn-danger" onclick="removeFromCart(${item.id})">Remove</button>
          </div>
        </div>
      `).join("");
      const total = cart.reduce((acc, i) => acc + i.price * i.qty, 0);
      summary.innerHTML = `
        <h4>Total: Ksh ${total}</h4>
        <button id="payButton" class="btn-success">Checkout</button>
      `;

      // Attach event to open modal
      document.getElementById("payButton").addEventListener("click", () => {
        const emailModal = new bootstrap.Modal(document.getElementById("emailModal"));
        emailModal.show();
      });
    }

    function removeFromCart(id) {
      cart = cart.filter(item => item.id !== id);
      localStorage.setItem("cart", JSON.stringify(cart));
      updateCartCount();
      renderCart();
    }
    renderCart();
  </script>
</body>
</html>
