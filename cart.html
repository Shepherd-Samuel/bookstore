<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Bookstore | Cart</title>

  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Embedded CSS -->
  <style>
    body { background: #f8f9fa; font-family: Arial, sans-serif; }
    nav { background: #212529; padding: 10px 20px; }
    nav a { color: #fff; margin: 0 10px; text-decoration: none; font-weight: 500; }
    nav a:hover { color: #ffc107; }
    .brand { display: flex; align-items: center; }
    .brand img { height: 45px; margin-right: 10px; }
    .brand h1 { font-size: 1.5rem; margin: 0; color: #fff; }
    h2 { text-align: center; margin: 20px 0; font-weight: bold; }
    .cart-container { max-width: 800px; margin: auto; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #ddd; }
    .cart-item img { width: 80px; border-radius: 5px; }
    .cart-summary { margin-top: 20px; text-align: right; }
    button { border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; }
    .btn-danger { background: #dc3545; color: white; }
    .btn-success { background: #28a745; color: white; }
    footer { background: #212529; color: #fff; text-align: center; padding: 15px; margin-top: 40px; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <nav class="d-flex justify-content-between align-items-center">
      <div class="brand">
        <img src="assets/logo.png" alt="Elite Bookstore Logo">
        <h1>Elite Bookstore</h1>
      </div>
      <div>
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
  </header>

  <!-- Cart Section -->
  <section>
    <h2>Your Shopping Cart</h2>
    <div class="cart-container" id="cart-container"></div>
    <div class="cart-summary" id="cart-summary"></div>
  </section>

  <!-- Email Modal -->
  <div class="modal fade" id="emailModal" tabindex="-1" aria-labelledby="emailModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="emailModalLabel">Enter Your Email</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input type="email" id="customerEmail" class="form-control" placeholder="example@email.com" required>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" id="confirmPay" class="btn btn-success">Proceed to Pay</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Elite Bookstore | All Rights Reserved</p>
  </footer>

  <!-- Scripts -->
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
  <script src="daraja.js"></script>
  <script>
    function renderCart() {
      const container = document.getElementById("cart-container");
      const summary = document.getElementById("cart-summary");
      if (cart.length === 0) {
        container.innerHTML = "<p>Your cart is empty.</p>";
        summary.innerHTML = "";
        return;
      }
      container.innerHTML = cart.map(item => `
        <div class="cart-item">
          <img src="${item.img}" alt="${item.title}">
          <div>
            <h5>${item.title}</h5>
            <p>Ksh ${item.price} x ${item.qty}</p>
          </div>
          <div>
            <button class="btn-danger" onclick="removeFromCart(${item.id})">Remove</button>
          </div>
        </div>
      `).join("");
      const total = cart.reduce((acc, i) => acc + i.price * i.qty, 0);
      summary.innerHTML = `
        <h4>Total: Ksh ${total}</h4>
        <button id="payButton" class="btn-success">Checkout</button>
      `;

      // Attach event to open modal
      document.getElementById("payButton").addEventListener("click", () => {
        const emailModal = new bootstrap.Modal(document.getElementById("emailModal"));
        emailModal.show();
      });
    }

    function removeFromCart(id) {
      cart = cart.filter(item => item.id !== id);
      localStorage.setItem("cart", JSON.stringify(cart));
      updateCartCount();
      renderCart();
    }
    renderCart();
  </script>
</body>
</html>
