<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Bookstore | Downloads</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f8f9fa; font-family: Arial, sans-serif; }
    nav { background: #212529; padding: 10px 20px; }
    nav a { color: #fff; margin: 0 10px; text-decoration: none; font-weight: 500; }
    nav a:hover { color: #ffc107; }
    .brand { display: flex; align-items: center; }
    .brand img { height: 45px; margin-right: 10px; }
    .brand h1 { font-size: 1.5rem; margin: 0; color: #fff; }
    h2 { text-align: center; margin: 20px 0; font-weight: bold; }
    .downloads-container { max-width: 800px; margin: auto; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .download-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #ddd; }
    .download-item img { width: 70px; height: 90px; object-fit: cover; border-radius: 5px; margin-right: 15px; }
    .download-item h5 { margin: 0; font-weight: bold; }
    .btn-download { background: #28a745; color: white; }
    .btn-download:hover { background: #218838; }
    footer { background: #212529; color: #fff; text-align: center; padding: 15px; margin-top: 40px; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <nav class="d-flex justify-content-between align-items-center">
      <div class="brand">
        <img src="assets/logo.png" alt="Elite Bookstore Logo">
        <h1>Elite Bookstore</h1>
      </div>
      <div>
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
  </header>

  <!-- Downloads Section -->
  <section>
    <h2>Your Downloads</h2>
    <div class="downloads-container" id="downloads-container">
      <p>Loading your purchased books...</p>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Elite Bookstore | All Rights Reserved</p>
  </footer>

  <!-- Scripts -->
  <script src="app.js"></script>
  <script>
    function renderDownloads() {
      const container = document.getElementById("downloads-container");
      const downloads = JSON.parse(localStorage.getItem("downloads")) || [];
      const access = localStorage.getItem("downloadAccess");

      if (!access || downloads.length === 0) {
        container.innerHTML = `
          <div class="text-center">
            <p class="text-danger fw-bold">⚠ You don’t have any active downloads.</p>
            <a href="shop.html" class="btn btn-primary mt-3">Go to Shop</a>
          </div>`;
        return;
      }

      container.innerHTML = downloads.map(book => {
        const imgSrc = book.img && /\.(png|jpg|jpeg|webp)$/i.test(book.img)
          ? book.img
          : 'assets/book-placeholder.png';

        return `
          <div class="download-item">
            <div class="d-flex align-items-center">
              <img src="${imgSrc}" alt="${book.title}" 
                   onerror="this.onerror=null;this.src='assets/book-placeholder.png';">
              <div>
                <h5>${book.title}</h5>
                <p class="mb-0">${book.author || ''}</p>
              </div>
            </div>
            <a href="${book.pdf}" download class="btn btn-download">Download PDF</a>
          </div>
        `;
      }).join("");
    }

    renderDownloads();
  </script>
</body>
</html>
