<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Bookstore | Contact</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- Embedded CSS -->
  <style>
    body { background: #f8f9fa; font-family: Arial, sans-serif; }

    .contact { 
      max-width: 650px; 
      margin: 40px auto; 
      padding: 25px; 
      background: #fff; 
      border-radius: 10px; 
      box-shadow: 0 2px 6px rgba(0,0,0,0.1); 
    }
    h2 { text-align: center; margin-bottom: 20px; }
    label { font-weight: 500; }
    .btn-submit { background: #212529; color: #fff; border: none; transition: 0.3s; }
    .btn-submit:hover { background: #ffc107; color: #000; }
    
    footer { 
      background: #212529; 
      color: #fff; 
      text-align: center; 
      padding: 15px; 
      margin-top: 40px; 
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="assets/logo.png" alt="Elite Bookstore Logo" style="height:40px; margin-right:10px;">
        Elite Bookstore
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" 
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html">Cart (<span id="cart-count">0</span>)</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contact Section -->
  <section class="contact">
    <h2><i class="bi bi-envelope-fill text-warning"></i> Get in Touch</h2>
    <form id="contactForm">
      <div class="mb-3">
        <label for="name">Name</label>
        <input id="name" type="text" class="form-control" placeholder="Your Name" required>
      </div>
      <div class="mb-3">
        <label for="email">Email</label>
        <input id="email" type="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="mb-3">
        <label for="message">Message</label>
        <textarea id="message" class="form-control" rows="4" placeholder="Type your message..." required></textarea>
      </div>
      <button type="submit" class="btn btn-submit w-100">
        <i class="bi bi-send-fill"></i> Send Message
      </button>
    </form>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Elite Bookstore | All Rights Reserved</p>
  </footer>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Cart count simulation (load from localStorage)
    document.getElementById("cart-count").innerText = localStorage.getItem("cartCount") || 0;

    // Contact form simulation
    document.getElementById("contactForm").addEventListener("submit", function(e) {
      e.preventDefault();
      alert("✅ Message sent successfully! (Simulation only)");
      this.reset();
    });
  </script>
</body>
</html>
