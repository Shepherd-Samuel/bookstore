<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Bookstore | Contact</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- Embedded CSS -->
  <style>
    body { background: #f8f9fa; font-family: Arial, sans-serif; }
    nav { background: #212529; padding: 10px 20px; }
    nav a { color: #fff; margin: 0 10px; text-decoration: none; font-weight: 500; }
    nav a:hover { color: #ffc107; }
    .brand { display: flex; align-items: center; }
    .brand img { height: 45px; margin-right: 10px; }
    .brand h1 { font-size: 1.5rem; margin: 0; color: #fff; }
    
    .contact { 
      max-width: 650px; 
      margin: 40px auto; 
      padding: 25px; 
      background: #fff; 
      border-radius: 10px; 
      box-shadow: 0 2px 6px rgba(0,0,0,0.1); 
    }
    h2 { text-align: center; margin-bottom: 20px; }
    label { font-weight: 500; }
    .btn-submit { background: #212529; color: #fff; border: none; transition: 0.3s; }
    .btn-submit:hover { background: #ffc107; color: #000; }
    
    footer { 
      background: #212529; 
      color: #fff; 
      text-align: center; 
      padding: 15px; 
      margin-top: 40px; 
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <nav class="d-flex justify-content-between align-items-center">
      <div class="brand">
        <img src="assets/logo.png" alt="Elite Bookstore Logo">
        <h1>Elite Bookstore</h1>
      </div>
      <div>
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
    </nav>
  </header>

  <!-- Contact Section -->
  <section class="contact">
    <h2><i class="bi bi-envelope-fill text-warning"></i> Get in Touch</h2>
    <form id="contactForm">
      <div class="mb-3">
        <label for="name">Name</label>
        <input id="name" type="text" class="form-control" placeholder="Your Name" required>
      </div>
      <div class="mb-3">
        <label for="email">Email</label>
        <input id="email" type="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="mb-3">
        <label for="message">Message</label>
        <textarea id="message" class="form-control" rows="4" placeholder="Type your message..." required></textarea>
      </div>
      <button type="submit" class="btn btn-submit w-100">
        <i class="bi bi-send-fill"></i> Send Message
      </button>
    </form>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Elite Bookstore | All Rights Reserved</p>
  </footer>

  <!-- JS -->
  <script>
    // Cart count simulation (load from localStorage)
    document.getElementById("cart-count").innerText = localStorage.getItem("cartCount") || 0;

    // Contact form simulation
    document.getElementById("contactForm").addEventListener("submit", function(e) {
      e.preventDefault();
      alert("✅ Message sent successfully! (Simulation only)");
      this.reset();
    });
  </script>
</body>
</html>
